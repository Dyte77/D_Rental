name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: d_rental_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run database migrations
        working-directory: backend
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d d_rental_test -f db/001_create_users_and_listings.sql
          psql -h localhost -U postgres -d d_rental_test -f db/002_create_listing_views.sql
          psql -h localhost -U postgres -d d_rental_test -f db/003_create_messages.sql
          psql -h localhost -U postgres -d d_rental_test -f db/004_add_otp_to_users.sql
          psql -h localhost -U postgres -d d_rental_test -f db/005_create_reports.sql
          psql -h localhost -U postgres -d d_rental_test -f db/006_add_suspension_to_users.sql
          psql -h localhost -U postgres -d d_rental_test -f db/007_create_listing_images.sql
          psql -h localhost -U postgres -d d_rental_test -f db/008_add_listing_indexes.sql
          psql -h localhost -U postgres -d d_rental_test -f db/009_create_saved_listings.sql
          psql -h localhost -U postgres -d d_rental_test -f db/010_add_profile_picture_to_users.sql
          psql -h localhost -U postgres -d d_rental_test -f db/011_add_share_count_to_listings.sql
          psql -h localhost -U postgres -d d_rental_test -f db/012_add_referrals.sql
          psql -h localhost -U postgres -d d_rental_test -f db/013_create_refresh_tokens.sql

      - name: Run tests
        working-directory: backend
        env:
          NODE_ENV: test
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: d_rental_test
          JWT_SECRET: ci_test_secret_key
        run: npm test